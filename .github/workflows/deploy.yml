name: Build and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t aleph-backend:${{ github.run_number }} .
          mkdir -p build/docker
          docker save -o build/docker/aleph-backend.tar aleph-backend:${{ github.run_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/docker/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://dashboard.aleph.im
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./build/docker

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $DEPLOY_HOST > ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}

      - name: Deploy backend image
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} mkdir -p ${DEPLOY_DIR}
          rsync -e "ssh -i ~/.ssh/id_rsa" build/docker/aleph-backend.tar ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DIR}/aleph-backend.tar
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "
            docker load -i ${DEPLOY_DIR}/aleph-backend.tar
            docker tag aleph-backend:${{ github.run_number }} aleph-backend:latest
            rm -f ${DEPLOY_DIR}/aleph-backend.tar
          "

      - name: Deploy frontend static files
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          STATIC_DIR: ${{ vars.STATIC_DIR }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          rsync -r -e "ssh -i ~/.ssh/id_rsa" dashboard/v2_enhanced.html dashboard/v2_enhanced.js ${DEPLOY_USER}@${DEPLOY_HOST}:${STATIC_DIR}/
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "echo 'window.__ENV__ = { API_BASE_URL: \"${API_BASE_URL:-}\" };' > ${STATIC_DIR}/env.js"

      - name: Restart backend
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} "docker compose -f ${DEPLOY_DIR}/docker-compose.yml up -d"
